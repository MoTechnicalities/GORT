name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run full test suite
        run: cargo test --all-targets --all-features

      - name: Enforce Phase 3 acceptance gates
        run: cargo test --test phase3_acceptance

      - name: Validate phase pipeline example
        run: cargo run --example phase2_pipeline --quiet
